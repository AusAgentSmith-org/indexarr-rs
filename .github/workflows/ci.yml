name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  ui-build:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run build
        working-directory: ui
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: [check, test, clippy, ui-build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build binary
        run: cargo build --release
        env:
          CARGO_PROFILE_RELEASE_LTO: ${{ startsWith(github.ref, 'refs/tags/') && 'fat' || 'thin' }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${{ startsWith(github.ref, 'refs/tags/') && '1' || '16' }}
      - name: Download UI
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui-dist
      - name: Package tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p staging/ui
          cp target/release/indexarr staging/indexarr
          cp -r ui-dist staging/ui/dist
          tar -czf "indexarr-${TAG}-linux-x86_64.tar.gz" -C staging .
          ls -lh "indexarr-${TAG}-linux-x86_64.tar.gz"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: indexarr-*-linux-x86_64.tar.gz
          retention-days: 1

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [check, test, clippy, ui-build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build binary
        run: cargo build --release
        env:
          CARGO_PROFILE_RELEASE_LTO: ${{ startsWith(github.ref, 'refs/tags/') && 'fat' || 'thin' }}
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${{ startsWith(github.ref, 'refs/tags/') && '1' || '16' }}
      - name: Download UI
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: installer/dist
      - name: Build NSIS installer
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PG_VERSION="17.4"
          echo "Downloading PostgreSQL ${PG_VERSION} binaries..."
          curl -fL "https://get.enterprisedb.com/postgresql/postgresql-${PG_VERSION}-1-windows-x64-binaries.zip" \
            -o installer/pgsql.zip
          cp target/release/indexarr.exe installer/indexarr.exe
          choco install nsis --no-progress -y
          makensis -DVERSION="${TAG}" -DPGVERSION="${PG_VERSION}" installer/windows.nsi
          ls -lh "installer/indexarr-${TAG}-windows-x86_64-setup.exe"
          rm -f installer/pgsql.zip installer/indexarr.exe
      - name: Upload raw exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: target/release/indexarr.exe
          retention-days: 1
      - name: Upload installer
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/indexarr-*-windows-x86_64-setup.exe
          retention-days: 1

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [check, test, clippy]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, docker]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir release

          cp artifacts/linux-tarball/indexarr-*-linux-x86_64.tar.gz release/
          cp artifacts/windows-exe/indexarr.exe "release/indexarr-${TAG}-windows-x86_64.exe"
          cp artifacts/windows-installer/indexarr-*-windows-x86_64-setup.exe release/

          # Bake the tag into the install script so it downloads the correct version
          sed "s|^VERSION=.*|VERSION=\"${TAG}\"|" installer/linux-install.sh \
            > "release/indexarr-${TAG}-linux-install.sh"
          chmod +x "release/indexarr-${TAG}-linux-install.sh"

          cd release && sha256sum * > SHA256SUMS.txt
          ls -lh
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          generate_release_notes: true
          files: release/*
          body: |
            ## Quick install (Linux)
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/indexarr-${{ github.ref_name }}-linux-install.sh | sudo bash
            ```

            ## Docker
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            SHA256 checksums in `SHA256SUMS.txt`.
