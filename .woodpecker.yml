when:
  - event: push
    branch: main
  - event: tag
  - event: manual
  - event: pull_request

steps:
  - name: fmt
    image: rust:1.88-bookworm
    commands:
      - rustup component add rustfmt
      - cargo fmt --all -- --check

  - name: check
    image: rust:1.88-bookworm
    commands:
      - cargo check --workspace

  - name: test
    image: rust:1.88-bookworm
    commands:
      - cargo test --workspace

  - name: clippy
    image: rust:1.88-bookworm
    commands:
      - rustup component add clippy
      - cargo clippy --workspace -- -D warnings

  - name: build-linux
    image: rust:1.88-bookworm
    commands:
      - if [ -n "$CI_COMMIT_TAG" ]; then export CARGO_PROFILE_RELEASE_LTO=fat CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 CARGO_PROFILE_RELEASE_STRIP=symbols; fi
      - cargo build --release
      - ls -lh target/release/indexarr
    when:
      - event: push
        branch: main
      - event: tag

  - name: build-windows
    image: rust:1.88-bookworm
    commands:
      - apt-get update && apt-get install -y --no-install-recommends clang llvm lld cmake nasm nsis
      - cargo install cargo-xwin@0.18.6 --index https://github.com/rust-lang/crates.io-index
      - rustup target add x86_64-pc-windows-msvc
      - if [ -n "$CI_COMMIT_TAG" ]; then export CARGO_PROFILE_RELEASE_LTO=fat CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 CARGO_PROFILE_RELEASE_STRIP=symbols; fi
      - cargo xwin build --release --target x86_64-pc-windows-msvc
      - ls -lh target/x86_64-pc-windows-msvc/release/indexarr.exe
      - |
        # Build NSIS installer (tags only — for push/main we still produce the raw exe)
        if [ -n "$CI_COMMIT_TAG" ]; then
          cp target/x86_64-pc-windows-msvc/release/indexarr.exe installer/indexarr.exe
          makensis -DVERSION="$CI_COMMIT_TAG" installer/windows.nsi
          ls -lh installer/indexarr-"$CI_COMMIT_TAG"-windows-x86_64-setup.exe
        fi
    when:
      - event: push
        branch: main
      - event: tag

  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: repo.indexarr.net/indexarr/indexarr-rs
      registry: repo.indexarr.net
      username:
        from_secret: git_auth_token
      password:
        from_secret: git_auth_token
      tag: latest
    when:
      - event: push
        branch: main

  - name: build-and-push-release
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: repo.indexarr.net/indexarr/indexarr-rs
      registry: repo.indexarr.net
      username:
        from_secret: git_auth_token
      password:
        from_secret: git_auth_token
      tag: ["${CI_COMMIT_TAG}", latest]
    when:
      - event: tag

  - name: publish-release
    image: alpine:3.23
    when:
      - event: tag
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache openssh-client coreutils
      - mkdir -p ~/.ssh
      - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan -H 100.92.4.57 >> ~/.ssh/known_hosts 2>/dev/null || true
      - |
        set -e
        TAG="$CI_COMMIT_TAG"
        echo "Publishing release $TAG"
        cp target/release/indexarr "indexarr-$TAG-linux-x86_64"
        cp target/x86_64-pc-windows-msvc/release/indexarr.exe "indexarr-$TAG-windows-x86_64.exe"
        cp "installer/indexarr-$TAG-windows-x86_64-setup.exe" .
        cp installer/linux-install.sh "indexarr-$TAG-linux-install.sh"
        sha256sum \
          "indexarr-$TAG-linux-x86_64" \
          "indexarr-$TAG-windows-x86_64.exe" \
          "indexarr-$TAG-windows-x86_64-setup.exe" \
          "indexarr-$TAG-linux-install.sh" \
          > "SHA256SUMS-$TAG.txt"
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new root@100.92.4.57 "mkdir -p /root/downloads/indexarr-rs/$TAG"
        scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
          "indexarr-$TAG-linux-x86_64" \
          "indexarr-$TAG-windows-x86_64.exe" \
          "indexarr-$TAG-windows-x86_64-setup.exe" \
          "indexarr-$TAG-linux-install.sh" \
          "SHA256SUMS-$TAG.txt" \
          root@100.92.4.57:/root/downloads/indexarr-rs/$TAG/
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new root@100.92.4.57 "cd /root/downloads/indexarr-rs/$TAG && \
          ln -sf indexarr-$TAG-linux-x86_64 indexarr-linux-x86_64 && \
          ln -sf indexarr-$TAG-windows-x86_64.exe indexarr-windows-x86_64.exe && \
          ln -sf indexarr-$TAG-windows-x86_64-setup.exe indexarr-windows-x86_64-setup.exe && \
          ln -sf indexarr-$TAG-linux-install.sh linux-install.sh"
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new root@100.92.4.57 "ln -sfn $TAG /root/downloads/indexarr-rs/latest"
        echo "Published to Vultr"

  - name: push-ghcr
    image: quay.io/skopeo/stable
    when:
      - event: tag
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - SRC="docker://repo.indexarr.net/indexarr/indexarr-rs:$CI_COMMIT_TAG"
      - SRC_CREDS="--src-creds=$FORGEJO_TOKEN:$FORGEJO_TOKEN"
      - DST_CREDS="--dest-creds=AusAgentSmith:$GH_TOKEN"
      - for tag in $CI_COMMIT_TAG latest; do skopeo copy $SRC_CREDS $DST_CREDS $SRC "docker://ghcr.io/ausagentsmith-org/indexarr-rs:$tag"; done

  - name: forgejo-release
    image: alpine:3.23
    when:
      - event: tag
    environment:
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - apk add --no-cache curl jq
      - |
        TAG="$CI_COMMIT_TAG"
        API="https://repo.indexarr.net/api/v1"
        REPO="indexarr/indexarr-rs"
        echo "Creating Forgejo release $TAG"

        BODY="## Downloads\n\n"
        BODY="$BODY### Windows\n"
        BODY="$BODY- **Installer** (recommended): \`indexarr-$TAG-windows-x86_64-setup.exe\`\n"
        BODY="$BODY- **Raw binary**: \`indexarr-$TAG-windows-x86_64.exe\`\n\n"
        BODY="$BODY### Linux\n"
        BODY="$BODY- **Installer script**: \`indexarr-$TAG-linux-install.sh\`\n"
        BODY="$BODY- **Raw binary**: \`indexarr-$TAG-linux-x86_64\`\n\n"
        BODY="$BODY### Docker\n"
        BODY="$BODY- \`ghcr.io/ausagentsmith-org/indexarr-rs:$TAG\`\n\n"
        BODY="$BODY### Linux quick-install\n"
        BODY="$BODY\`\`\`bash\ncurl -fsSL https://indexarr.net/downloads/$TAG/indexarr-$TAG-linux-install.sh | sudo bash\n\`\`\`\n\n"
        BODY="$BODYMSHA256 checksums in \`SHA256SUMS-$TAG.txt\`"

        EXISTING_ID=$(curl -s -H "Authorization: token $FORGEJO_TOKEN" \
          "$API/repos/$REPO/releases/tags/$TAG" | jq -r '.id // empty')
        if [ -n "$EXISTING_ID" ]; then
          echo "Deleting existing release ID=$EXISTING_ID"
          curl -s -X DELETE -H "Authorization: token $FORGEJO_TOKEN" \
            "$API/repos/$REPO/releases/$EXISTING_ID"
        fi

        RELEASE_ID=$(curl -s -X POST \
          -H "Authorization: token $FORGEJO_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"tag_name\":\"$TAG\",\"name\":\"indexarr $TAG\",\"body\":\"$BODY\",\"draft\":false,\"prerelease\":true}" \
          "$API/repos/$REPO/releases" | jq -r '.id')

        if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
          echo "ERROR: Failed to create Forgejo release"; exit 1
        fi

        for file in \
          "indexarr-$TAG-linux-x86_64" \
          "indexarr-$TAG-linux-install.sh" \
          "indexarr-$TAG-windows-x86_64.exe" \
          "indexarr-$TAG-windows-x86_64-setup.exe" \
          "SHA256SUMS-$TAG.txt"; do
          [ -f "$file" ] || continue
          echo "Uploading $file"
          curl -sf -X POST \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -F "attachment=@$file" \
            "$API/repos/$REPO/releases/$RELEASE_ID/assets" > /dev/null
        done
        echo "Forgejo release $TAG complete"

  - name: github-release
    image: alpine:3.23
    when:
      - event: tag
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - apk add --no-cache curl jq
      - |
        TAG="$CI_COMMIT_TAG"
        REPO="AusAgentSmith-org/indexarr-rs"
        echo "Creating GitHub release $TAG"

        BODY="## Downloads\n\n"
        BODY="$BODY### Windows\n"
        BODY="$BODY- **Installer** (recommended): \`indexarr-$TAG-windows-x86_64-setup.exe\`\n"
        BODY="$BODY- **Raw binary**: \`indexarr-$TAG-windows-x86_64.exe\`\n\n"
        BODY="$BODY### Linux\n"
        BODY="$BODY- **Installer script**: \`indexarr-$TAG-linux-install.sh\`\n"
        BODY="$BODY- **Raw binary**: \`indexarr-$TAG-linux-x86_64\`\n\n"
        BODY="$BODY### Docker\n"
        BODY="$BODY- \`ghcr.io/ausagentsmith-org/indexarr-rs:$TAG\`\n\n"
        BODY="$BODY### Linux quick-install\n"
        BODY="$BODY\`\`\`bash\ncurl -fsSL https://indexarr.net/downloads/$TAG/indexarr-$TAG-linux-install.sh | sudo bash\n\`\`\`\n\n"
        BODY="$BODYMSHA256 checksums in \`SHA256SUMS-$TAG.txt\`"

        EXISTING_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
          "https://api.github.com/repos/$REPO/releases/tags/$TAG" | jq -r '.id // empty')
        if [ -n "$EXISTING_ID" ]; then
          echo "Deleting existing release ID=$EXISTING_ID"
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/$EXISTING_ID"
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/git/refs/tags/$TAG" || true
        fi

        RELEASE_ID=$(curl -s -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"main\",\"name\":\"indexarr $TAG\",\"body\":\"$BODY\",\"draft\":false,\"prerelease\":true}" \
          "https://api.github.com/repos/$REPO/releases" | jq -r '.id')

        if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
          echo "ERROR: Failed to create GitHub release"; exit 1
        fi

        for file in \
          "indexarr-$TAG-linux-x86_64" \
          "indexarr-$TAG-linux-install.sh" \
          "indexarr-$TAG-windows-x86_64.exe" \
          "indexarr-$TAG-windows-x86_64-setup.exe" \
          "SHA256SUMS-$TAG.txt"; do
          [ -f "$file" ] || continue
          echo "Uploading $file"
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$file" \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$file" > /dev/null
        done
        echo "GitHub release $TAG complete"

  - name: discord-success
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Successful\",
            \"description\": \"**${CI_REPO}** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 5025616,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [success]

  - name: discord-failure
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Failed\",
            \"description\": \"**${CI_REPO}** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 15548997,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [failure]
